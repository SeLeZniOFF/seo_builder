<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | {{ site.name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #ffffff; }
        .thank-you-card {
            background-color: #1e1e1e;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .check-icon {
            font-size: 80px;
            color: #198754;
            line-height: 1;
            margin-bottom: 20px;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center" style="height: 100vh; margin: 0;">
    <div class="container text-center">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="thank-you-card">
                    <div class="check-icon">✓</div>
                    <h1 class="h2 fw-bold mb-3">Thank You!</h1>
                    <p class="text-secondary mb-4">
                        Your request to <strong>{{ site.name }}</strong> has been successfully received. <br>
                        Our team will contact you shortly.
                    </p>
                    <a href="/" class="btn btn-outline-light px-4 py-2 rounded-pill">Back to Home</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
